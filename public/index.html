<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitPulse - Premium Gym Management</title>
    <!-- Google Fonts for elegant typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="app-container">
        
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-dumbbell"></i>
                <h2>FitPulse</h2>
            </div>
            
            <nav>
                <a href="#" class="nav-item active" id="nav-dashboard">
                    <i class="fa-solid fa-house"></i> Dashboard
                </a>
                <a href="#" class="nav-item" id="nav-members">
                    <i class="fa-solid fa-users"></i> Members List
                </a>
            </nav>

            <div class="user-profile">
                <div class="avatar">
                    <i class="fa-solid fa-user-tie"></i>
                </div>
                <div class="user-info">
                    <p class="name">Admin User</p>
                    <p class="role">Manager</p>
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="top-header">
                <div>
                    <h1>Welcome back, Admin</h1>
                    <p class="subtitle">Here's what's happening today.</p>
                </div>
                <div class="header-actions">
                    <button class="btn btn-icon"><i class="fa-solid fa-bell"></i></button>
                    <button class="btn btn-primary" id="add-member-btn" onclick="openModal()">
                        <i class="fa-solid fa-plus"></i> Add Member
                    </button>
                </div>
            </header>

            <!-- Dashboard Stats -->
            <section class="stats-grid" id="dashboard-section">
                <div class="stat-card">
                    <div class="stat-icon purple-gradient">
                        <i class="fa-solid fa-users"></i>
                    </div>
                    <div class="stat-details">
                        <p>Total Members</p>
                        <h2 id="total-members-count">...</h2>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon blue-gradient">
                        <i class="fa-solid fa-chart-line"></i>
                    </div>
                    <div class="stat-details">
                        <p>Active Plans</p>
                        <h2 id="active-plans-count">...</h2>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon pink-gradient">
                        <i class="fa-solid fa-wallet"></i>
                    </div>
                    <div class="stat-details">
                        <p>Revenue Estimate</p>
                        <h2 id="revenue-estimate">...</h2>
                    </div>
                </div>
            </section>

            <!-- Members Table Section -->
            <section class="members-section" id="members-table-section">
                <div class="section-header">
                    <h2>Recent Members</h2>
                </div>
                
                <div class="table-container">
                    <table class="premium-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Join Date</th>
                                <th>Plan</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="members-table-body">
                            <!-- Populated via JavaScript -->
                             <tr>
                                <td colspan="7" class="loading-state">
                                   <i class="fa-solid fa-spinner fa-spin"></i> Loading members...
                                </td>
                             </tr>
                        </tbody>
                    </table>
                </div>
            </section>

        </main>
    </div>

    <!-- Modal for Adding Member -->
    <div class="modal-overlay" id="addMemberModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add New Member</h2>
                <button class="close-btn" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="add-member-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="first_name">First Name</label>
                        <input type="text" id="first_name" required placeholder="John">
                    </div>
                    <div class="form-group">
                        <label for="last_name">Last Name</label>
                        <input type="text" id="last_name" required placeholder="Doe">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="john@example.com">
                </div>
                
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" placeholder="+1 (555) 000-0000">
                </div>
                
                <div class="form-group">
                    <label for="plan_id">Select Plan</label>
                    <select id="plan_id">
                        <option value="">-- Choose a Plan --</option>
                        <!-- Populated via JS -->
                    </select>
                </div>
                
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="save-member-btn">Save Member</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast hidden">
        <div class="toast-content" id="toast-message">Operation successful!</div>
    </div>

    <script src="app.js"></script>
</body>
</html>
